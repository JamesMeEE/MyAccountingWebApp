<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0a0a0a">
<link rel="icon" type="image/png" href="https://raw.githubusercontent.com/JamesMeEE/MyAccountingWebApp/refs/heads/main/icon.png?v=3">
<link rel="apple-touch-icon" href="https://raw.githubusercontent.com/JamesMeEE/MyAccountingWebApp/refs/heads/main/icon.png?v=3">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="จดรายจ่าย">
<link rel="manifest" href='manifest.json'>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/themes/dark.css">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#0a0a0a;--surface:#141414;--surface2:#1e1e1e;--surface3:#282828;
--accent:#c8ff00;--accent-dim:#6b8700;--text:#e8e8e8;--text2:#888;
--red:#ff4757;--green:#2ed573;--blue:#4dabf7;--yellow:#feca57;--radius:16px;
--safe-top:env(safe-area-inset-top,20px);
--safe-bottom:env(safe-area-inset-bottom,20px);
}
html,body{
height:100%;width:100%;overflow:hidden;
background:var(--bg);color:var(--text);
font-family:'IBM Plex Sans Thai',sans-serif;
-webkit-tap-highlight-color:transparent;
-webkit-font-smoothing:antialiased;
touch-action:manipulation;
}
.app{
display:flex;flex-direction:column;height:100%;
padding-top:var(--safe-top);
padding-bottom:var(--safe-bottom);
}
.header{
padding:16px 20px 12px;
display:flex;justify-content:space-between;align-items:flex-end;
}
.header h1{font-size:15px;font-weight:500;color:var(--text2);letter-spacing:0.5px;text-transform:uppercase;}
.header .month-label{
font-family:'DM Mono',monospace;font-size:13px;color:var(--accent);
background:rgba(200,255,0,0.08);padding:4px 10px;border-radius:20px;
}

.scroll-area{
flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;
scrollbar-width:none;
}
.scroll-area::-webkit-scrollbar{display:none;}

.summary-card{
margin:8px 20px 16px;padding:24px;
background:linear-gradient(135deg,#1a1a1a 0%,#111 100%);
border:1px solid #222;border-radius:var(--radius);
position:relative;overflow:hidden;
}
.summary-card::before{
content:'';position:absolute;top:-40px;right:-40px;
width:120px;height:120px;
background:radial-gradient(circle,rgba(200,255,0,0.06) 0%,transparent 70%);
border-radius:50%;
}
.summary-total{
font-family:'DM Mono',monospace;font-size:42px;font-weight:500;
color:var(--text);line-height:1;margin-bottom:4px;
}
.summary-total .currency{font-size:18px;color:var(--text2);margin-right:4px;}
.summary-label-top{font-size:12px;color:var(--text2);letter-spacing:1px;text-transform:uppercase;}

.summary-row{display:flex;flex-direction:column;gap:8px;margin:12px 20px 16px;}
.summary-stat{
padding:14px 16px;background:rgba(255,255,255,0.03);
border-radius:12px;display:flex;justify-content:space-between;align-items:center;
}
.summary-stat .val{font-family:'DM Mono',monospace;font-size:16px;font-weight:500;}
.summary-stat .val.income{color:var(--green);}
.summary-stat .val.expense{color:var(--red);}
.summary-stat .val.credit{color:var(--yellow);}
.summary-stat .lbl{font-size:10px;color:var(--text2);margin-top:4px;}
.summary-stat .val .inline-spinner{
width:16px;height:16px;
border:2px solid #333;border-top:2px solid var(--accent);
border-radius:50%;animation:spin .8s linear infinite;
display:inline-block;vertical-align:middle;
}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}

.period-bar{
display:flex;gap:4px;margin:0 20px 8px;
background:var(--surface);border-radius:12px;padding:4px;
}
.period-btn{
flex:1;padding:8px;text-align:center;font-size:12px;font-weight:500;
border-radius:10px;cursor:pointer;transition:all .2s;color:var(--text2);
border:none;background:none;font-family:inherit;
}
.period-btn.active{background:var(--surface3);color:var(--text);}
.period-btn:active{transform:scale(0.97);}

.period-controls{
display:none;margin:0 20px 12px;gap:8px;justify-content:center;
}
.period-controls.show{display:flex;}
.period-select{
padding:8px 12px;background:var(--surface2);border:1px solid #333;
border-radius:10px;color:var(--text);font-size:13px;font-family:inherit;
-webkit-appearance:none;outline:none;
}
.period-select:focus{border-color:var(--accent);}

.credit-bar{
display:flex;gap:4px;margin:0 20px 12px;
}
.credit-btn{
flex:1;padding:8px;text-align:center;font-size:11px;font-weight:500;
border-radius:10px;cursor:pointer;transition:all .2s;
border:1px solid #333;background:var(--surface);color:var(--text2);
font-family:inherit;
}
.credit-btn.active{border-color:var(--yellow);background:rgba(254,202,87,0.08);color:var(--yellow);}
.credit-btn:active{transform:scale(0.97);}

.section-title{
font-size:11px;font-weight:600;color:var(--text2);
letter-spacing:1px;text-transform:uppercase;
margin:20px 20px 10px;padding-left:4px;
}

.chart-bars{margin:0 20px 20px;}
.chart-bar-container{margin-bottom:16px;}
.chart-bar-label{display:flex;justify-content:space-between;font-size:12px;margin-bottom:6px;}
.chart-bar-label .cat-name{color:var(--text);}
.chart-bar-label .cat-val{font-family:'DM Mono',monospace;color:var(--text2);}
.chart-bar-track{height:8px;background:var(--surface2);border-radius:4px;overflow:hidden;}
.chart-bar-fill{height:100%;border-radius:4px;transition:width .6s cubic-bezier(0.32,0.72,0,1);}

.fab{
position:fixed;bottom:calc(80px + var(--safe-bottom));right:20px;
width:56px;height:56px;border-radius:50%;
background:var(--accent);color:#000;
border:none;font-size:28px;font-weight:300;
display:flex;align-items:center;justify-content:center;
cursor:pointer;box-shadow:0 4px 20px rgba(200,255,0,0.3);
transition:all .2s;z-index:10;
}
.fab:active{transform:scale(0.9);}

.bottom-nav{
display:flex;
background:rgba(14,14,14,0.95);
backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
border-top:1px solid #1a1a1a;
padding:8px 0 calc(8px + var(--safe-bottom));
}
.nav-item{
flex:1;display:flex;flex-direction:column;align-items:center;
gap:4px;padding:8px 0;cursor:pointer;transition:all .2s;
}
.nav-item svg{width:22px;height:22px;stroke:var(--text2);fill:none;stroke-width:1.8;}
.nav-item span{font-size:10px;color:var(--text2);font-weight:500;}
.nav-item.active svg{stroke:var(--accent);}
.nav-item.active span{color:var(--accent);}

.view{display:none;}
.view.active{display:flex;flex-direction:column;flex:1;overflow:hidden;}

.modal-overlay{
position:fixed;inset:0;background:rgba(0,0,0,0.7);
backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
z-index:100;display:none;align-items:flex-end;justify-content:center;
}
.modal-overlay.open{display:flex;}
.modal{
width:100%;max-width:500px;
background:var(--surface);border-radius:20px 20px 0 0;
padding:20px 20px calc(20px + var(--safe-bottom));
transform:translateY(100%);
transition:transform .35s cubic-bezier(0.32,0.72,0,1);
max-height:90vh;overflow-y:auto;
}
.modal-overlay.open .modal{transform:translateY(0);}
.modal-handle{width:36px;height:4px;background:var(--surface3);border-radius:2px;margin:0 auto 20px;}
.modal h2{font-size:18px;font-weight:600;margin-bottom:20px;}

.type-toggle{
display:flex;gap:4px;background:var(--surface2);
border-radius:12px;padding:4px;margin-bottom:16px;
}
.type-btn{
flex:1;padding:12px;text-align:center;border-radius:10px;
font-size:14px;font-weight:500;cursor:pointer;
transition:all .2s;color:var(--text2);border:none;background:none;
font-family:inherit;
}
.type-btn.active-expense{background:rgba(255,71,87,0.15);color:var(--red);}
.type-btn.active-income{background:rgba(46,213,115,0.15);color:var(--green);}

.form-group{margin-bottom:14px;}
.form-label{
display:block;font-size:12px;color:var(--text2);
margin-bottom:6px;font-weight:500;letter-spacing:0.5px;
text-transform:uppercase;
}
.form-input,.form-select,.form-textarea{
width:100%;padding:14px 16px;
background:var(--surface2);border:1px solid #333;
border-radius:12px;color:var(--text);font-size:16px;
font-family:inherit;outline:none;transition:border .2s;
-webkit-appearance:none;
}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--accent);}
.form-input::placeholder,.form-textarea::placeholder{color:#555;}
.form-textarea{resize:vertical;min-height:70px;}
.amount-input{
font-family:'DM Mono',monospace;font-size:28px;
text-align:center;padding:20px;font-weight:500;
}

.cat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
.cat-btn{
padding:10px 4px;border-radius:12px;border:1px solid #333;
background:var(--surface2);cursor:pointer;text-align:center;
transition:all .2s;
}
.cat-btn:active{transform:scale(0.95);}
.cat-btn.selected{border-color:var(--accent);background:rgba(200,255,0,0.08);}
.cat-btn .emoji{font-size:20px;display:block;margin-bottom:4px;}
.cat-btn .name{font-size:10px;color:var(--text2);}
.cat-btn.selected .name{color:var(--accent);}

.payment-toggle{
display:flex;gap:4px;background:var(--surface2);
border-radius:12px;padding:4px;
}
.pay-btn{
flex:1;padding:10px;text-align:center;border-radius:10px;
font-size:13px;font-weight:500;cursor:pointer;
transition:all .2s;color:var(--text2);border:none;background:none;
font-family:inherit;
}
.pay-btn.active{background:var(--surface3);color:var(--text);}

.submit-btn{
width:100%;padding:16px;border:none;border-radius:14px;
background:var(--accent);color:#000;font-size:16px;
font-weight:600;font-family:inherit;cursor:pointer;
margin-top:8px;transition:all .2s;
}
.submit-btn:active{transform:scale(0.98);opacity:0.9;}
.submit-btn:disabled{opacity:0.3;pointer-events:none;}

.toast{
position:fixed;top:calc(20px + var(--safe-top));left:20px;right:20px;
padding:14px 20px;border-radius:14px;
background:var(--surface2);border:1px solid #333;
font-size:14px;text-align:center;z-index:200;
transform:translateY(-120%);transition:transform .4s cubic-bezier(0.32,0.72,0,1);
}
.toast.show{transform:translateY(0);}
.toast.success{border-color:var(--green);color:var(--green);}
.toast.error{border-color:var(--red);color:var(--red);}
.empty-state{text-align:center;padding:60px 20px;color:var(--text2);}
.empty-state .icon{font-size:48px;margin-bottom:16px;opacity:0.4;}
.empty-state p{font-size:14px;}

@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

@media(min-width:500px){
.app{max-width:430px;margin:0 auto;border-left:1px solid #1a1a1a;border-right:1px solid #1a1a1a;}
.modal{max-width:430px;}
}

.flatpickr-calendar{
background:var(--surface)!important;
border:1px solid #333!important;
box-shadow:0 10px 40px rgba(0,0,0,0.5)!important;
border-radius:14px!important;
}
.flatpickr-months .flatpickr-month{background:var(--surface)!important;color:var(--text)!important;}
.flatpickr-current-month .flatpickr-monthDropdown-months{background:var(--surface)!important;color:var(--text)!important;}
.flatpickr-weekdays{background:var(--surface)!important;}
span.flatpickr-weekday{color:var(--text2)!important;font-weight:600!important;}
.flatpickr-day{color:var(--text)!important;border-radius:8px!important;}
.flatpickr-day.selected{background:var(--accent)!important;border-color:var(--accent)!important;color:#000!important;}
.flatpickr-day:hover{background:var(--surface3)!important;}
.flatpickr-day.today{border-color:var(--accent)!important;}
.numInputWrapper span{border:none!important;}
.numInputWrapper span:hover{background:var(--surface3)!important;}
.flatpickr-months .flatpickr-prev-month,.flatpickr-months .flatpickr-next-month{fill:var(--text)!important;color:var(--text)!important;}
.flatpickr-months .flatpickr-prev-month svg,.flatpickr-months .flatpickr-next-month svg{fill:var(--text)!important;}
</style>
</head>
<body>
<div class="app">
<div class="header">
<h1>จดรายจ่าย</h1>
<span class="month-label" id="monthLabel"></span>
</div>

<div class="view" id="homeView">
<div class="scroll-area">

<div class="summary-card">
<div style="display:flex;justify-content:space-between;align-items:flex-start;">
<div>
<div class="summary-label-top">ยอดรวม</div>
<div class="summary-total"><span class="currency">฿</span><span id="balanceVal">0</span></div>
</div>
<a href="https://docs.google.com/spreadsheets/d/1adeQeH1s9aJm77FDoHhUt4qTOiiknp_ht5i86qiF1AE/edit?usp=sharing" target="_blank" style="
display:inline-flex;align-items:center;gap:5px;
padding:10px 18px;border-radius:10px;
background:rgba(46,213,115,0.1);border:1px solid rgba(46,213,115,0.2);
color:#2ed573;font-size:12px;font-weight:500;text-decoration:none;
flex-shrink:0;margin-top:2px;cursor:pointer;
">
<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
Sheet
</a>
</div>
</div>

<div id="summaryDetails">
<div class="summary-row">
<div class="summary-stat">
<div class="lbl">รายจ่าย</div>
<div class="val expense" id="expenseVal">-฿0</div>
</div>
<div class="summary-stat">
<div class="lbl">รายรับ</div>
<div class="val income" id="incomeVal">+฿0</div>
</div>
<div class="summary-stat">
<div class="lbl">บัตรเครดิต</div>
<div class="val credit" id="creditVal">฿0</div>
</div>
</div>

<div class="period-bar">
<button class="period-btn" data-period="month">รายเดือน</button>
<button class="period-btn" data-period="year">รายปี</button>
<button class="period-btn active" data-period="all">ทั้งหมด</button>
</div>

<div class="period-controls" id="periodControls">
<select class="period-select" id="yearSelect"></select>
<select class="period-select" id="monthSelect"></select>
</div>

<div class="credit-bar">
<button class="credit-btn active" data-credit="current">บัตรเครดิต: รอบนี้</button>
<button class="credit-btn" data-credit="previous">รอบก่อน</button>
</div>

<div class="section-title" style="margin:20px 20px 10px;padding-left:4px;">รายจ่ายตามหมวดหมู่</div>
<div class="chart-bars" id="chartBars">
<div class="empty-state"><div class="icon">📊</div><p>ยังไม่มีข้อมูล</p></div>
</div>
</div>

</div>
</div>

<div class="view active" id="addView">
<div class="scroll-area" style="padding:20px;">
<h2 style="font-size:18px;font-weight:600;margin-bottom:20px;">เพิ่มรายการ</h2>

<div class="type-toggle">
<button class="type-btn active-expense" id="btnExpense" onclick="setType('expense')">รายจ่าย</button>
<button class="type-btn" id="btnIncome" onclick="setType('income')">รายรับ</button>
</div>

<div id="expenseForm">
<div class="form-group">
<label class="form-label">จำนวนเงิน</label>
<input class="form-input amount-input" id="inputAmount" type="number" inputmode="decimal" placeholder="0" step="0.01">
</div>
<div class="form-group">
<label class="form-label">วันที่</label>
<input class="form-input" id="inputDate" type="text" placeholder="dd/mm/yyyy" readonly>
</div>
<div class="form-group" id="itemGroup">
<label class="form-label">รายการ</label>
<input class="form-input" id="inputItem" type="text" placeholder="เช่น ข้าวมันไก่">
</div>
<div class="form-group" id="catGroup">
<label class="form-label">ประเภท</label>
<div class="cat-grid" id="catGrid"></div>
</div>
<div class="form-group" id="payGroup">
<label class="form-label">วิธีจ่าย</label>
<div class="payment-toggle">
<button type="button" class="pay-btn active" data-pay="เงินสด" onclick="setPayment(this)">💵 เงินสด</button>
<button type="button" class="pay-btn" data-pay="บัตรเครดิต" onclick="setPayment(this)">💳 บัตรเครดิต</button>
</div>
</div>
<div class="form-group" id="detailGroup" style="display:none;">
<label class="form-label">รายละเอียด</label>
<input class="form-input" id="inputDetail" type="text" placeholder="เช่น เงินเดือน มี.ค.">
</div>
<div class="form-group" id="taxGroup" style="display:none;">
<label class="form-label">หักภาษี 3%</label>
<div style="display:flex;align-items:center;gap:12px;">
<span style="font-size:13px;color:var(--text2);">ไม่โดน</span>
<label style="position:relative;width:48px;height:28px;flex-shrink:0;cursor:pointer;">
<input type="checkbox" id="taxToggle" style="opacity:0;width:0;height:0;">
<span style="position:absolute;inset:0;background:var(--surface3);border-radius:14px;transition:all .3s;"></span>
<span style="position:absolute;top:3px;left:3px;width:22px;height:22px;background:var(--text2);border-radius:50%;transition:all .3s;" id="taxKnob"></span>
</label>
<span style="font-size:13px;color:var(--text2);" id="taxLabel">โดน</span>
</div>
</div>
<div class="form-group">
<label class="form-label">Note</label>
<textarea class="form-textarea" id="inputNote" placeholder="บันทึกเพิ่มเติม (ไม่จำเป็น)"></textarea>
</div>
<button class="submit-btn" id="submitBtn" onclick="submitForm()" disabled>บันทึก</button>
</div>
</div>
</div>

<button class="fab" id="fabBtn" onclick="switchView('add')" style="display:none;">+</button>

<nav class="bottom-nav">
<div class="nav-item" data-view="home">
<svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
<span>หน้าหลัก</span>
</div>
<div class="nav-item active" data-view="add">
<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
<span>เพิ่ม</span>
</div>
</nav>
</div>

<div class="toast" id="toast"></div>

<script>
var SHEET_URL = "https://script.google.com/macros/s/AKfycbwRhfnL0JZGC09EALSJcssZO5fY6FcsPvNdgG4nUFwbzEC1jHGkwJ5pQfB-z8gr4RGibw/exec";

function gasGet(action, params) {
  var url = SHEET_URL + '?action=' + action;
  for (var k in params) url += '&' + k + '=' + encodeURIComponent(params[k]);
  return fetch(url).then(function(r) { return r.json(); });
}

function gasPost(action, data) {
  return fetch(SHEET_URL, {
    method: 'POST',
    mode: 'no-cors',
    headers: {'Content-Type': 'text/plain'},
    body: JSON.stringify({action: action, data: data})
  });
}
</script>
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script>
var CATEGORIES = [
  {id:'อาหาร',emoji:'🍜',color:'#ff6b6b'},
  {id:'ขนม',emoji:'🍰',color:'#c77dba'},
  {id:'กินเหล้า',emoji:'🍺',color:'#feca57'},
  {id:'ค่าเดินทาง',emoji:'🚗',color:'#4dabf7'},
  {id:'ความบันเทิง',emoji:'🎮',color:'#845ef7'},
  {id:'ของใช้',emoji:'🛍️',color:'#ff922b'},
  {id:'อื่นๆ',emoji:'📦',color:'#868e96'}
];

var currentType = 'expense';
var selectedCat = 'อาหาร';
var selectedPayment = 'เงินสด';
var currentPeriod = 'all';
var currentYear = new Date().getFullYear();
var currentMonth = new Date().getMonth();
var currentCreditPeriod = 'current';
var currentView = 'add';

function init() {
  updateMonthLabel();
  renderCats();
  initPeriodSelectors();
  initFlatpickr();
  setupEvents();
  loadSummary();
  loadCreditTotal();
  loadCategoryChart();
}

function initFlatpickr() {
  flatpickr('#inputDate', {
    dateFormat: 'd/m/Y',
    defaultDate: new Date(),
    locale: {
      firstDayOfWeek: 1,
      weekdays: {
        shorthand: ['อา','จ','อ','พ','พฤ','ศ','ส'],
        longhand: ['อาทิตย์','จันทร์','อังคาร','พุธ','พฤหัสบดี','ศุกร์','เสาร์']
      },
      months: {
        shorthand: ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'],
        longhand: ['มกราคม','กุมภาพันธ์','มีนาคม','เมษายน','พฤษภาคม','มิถุนายน','กรกฎาคม','สิงหาคม','กันยายน','ตุลาคม','พฤศจิกายน','ธันวาคม']
      }
    }
  });
}

function initPeriodSelectors() {
  var yearSelect = document.getElementById('yearSelect');
  var monthSelect = document.getElementById('monthSelect');
  var cy = new Date().getFullYear();

  for (var y = cy; y >= cy - 5; y--) {
    var opt = document.createElement('option');
    opt.value = y;
    opt.textContent = y;
    yearSelect.appendChild(opt);
  }

  var mNames = ['มกราคม','กุมภาพันธ์','มีนาคม','เมษายน','พฤษภาคม','มิถุนายน','กรกฎาคม','สิงหาคม','กันยายน','ตุลาคม','พฤศจิกายน','ธันวาคม'];
  mNames.forEach(function(m, i) {
    var opt = document.createElement('option');
    opt.value = i;
    opt.textContent = m;
    monthSelect.appendChild(opt);
  });

  yearSelect.value = currentYear;
  monthSelect.value = currentMonth;

  yearSelect.addEventListener('change', function() {
    currentYear = parseInt(yearSelect.value);
    loadSummary();
    loadCategoryChart();
  });
  monthSelect.addEventListener('change', function() {
    currentMonth = parseInt(monthSelect.value);
    loadSummary();
    loadCategoryChart();
  });
}

function updateMonthLabel() {
  var now = new Date();
  var months = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
  document.getElementById('monthLabel').textContent = months[now.getMonth()] + ' ' + (now.getFullYear() + 543);
}

function formatNum(n) {
  return Math.abs(n).toLocaleString('th-TH', {minimumFractionDigits: 2, maximumFractionDigits: 2});
}

function showSpinner(id) {
  document.getElementById(id).innerHTML = '<span class="inline-spinner"></span>';
}

function loadSummary() {
  showSpinner('expenseVal');
  showSpinner('incomeVal');
  showSpinner('balanceVal');

  gasGet('getSummary', {period: currentPeriod, year: currentYear, month: currentMonth})
    .then(function(result) {
      document.getElementById('expenseVal').textContent = '-฿' + formatNum(result.totalExpense);
      document.getElementById('incomeVal').textContent = '+฿' + formatNum(result.totalIncome);
      var bal = result.balance;
      document.getElementById('balanceVal').textContent = (bal < 0 ? '-' : '') + formatNum(bal);
    })
    .catch(function() {
      document.getElementById('expenseVal').textContent = '-';
      document.getElementById('incomeVal').textContent = '-';
      document.getElementById('balanceVal').textContent = '-';
      showToast('โหลดข้อมูลไม่ได้', 'error');
    });
}

function loadCreditTotal() {
  showSpinner('creditVal');

  gasGet('getCreditCardTotal', {creditPeriod: currentCreditPeriod})
    .then(function(total) {
      document.getElementById('creditVal').textContent = '฿' + formatNum(total);
    })
    .catch(function() {
      document.getElementById('creditVal').textContent = '-';
    });
}

function loadCategoryChart() {
  var container = document.getElementById('chartBars');
  container.innerHTML = '<div style="text-align:center;padding:20px;"><span class="inline-spinner"></span></div>';

  gasGet('getExpenseByCategory', {period: currentPeriod, year: currentYear, month: currentMonth})
    .then(function(catTotals) {
      var entries = [];
      for (var k in catTotals) {
        entries.push([k, catTotals[k]]);
      }
      entries.sort(function(a, b) { return b[1] - a[1]; });

      if (!entries.length) {
        container.innerHTML = '<div class="empty-state"><div class="icon">📊</div><p>ยังไม่มีข้อมูล</p></div>';
        return;
      }

      var max = entries[0][1];
      container.innerHTML = entries.map(function(entry) {
        var catId = entry[0], total = entry[1];
        var cat = CATEGORIES.find(function(c) { return c.id === catId; }) || {emoji:'📦', color:'#868e96'};
        var pct = max ? (total / max * 100) : 0;
        return '<div class="chart-bar-container">' +
          '<div class="chart-bar-label">' +
            '<span class="cat-name">' + cat.emoji + ' ' + catId + '</span>' +
            '<span class="cat-val">฿' + formatNum(total) + '</span>' +
          '</div>' +
          '<div class="chart-bar-track">' +
            '<div class="chart-bar-fill" style="width:' + pct + '%;background:' + cat.color + '"></div>' +
          '</div>' +
        '</div>';
      }).join('');
    })
    .catch(function() {
      container.innerHTML = '<div class="empty-state"><p>โหลดไม่ได้</p></div>';
    });
}

function renderCats() {
  var grid = document.getElementById('catGrid');
  grid.innerHTML = CATEGORIES.map(function(c) {
    return '<div class="cat-btn ' + (selectedCat === c.id ? 'selected' : '') + '" onclick="selectCat(\'' + c.id + '\')">' +
      '<span class="emoji">' + c.emoji + '</span>' +
      '<span class="name">' + c.id + '</span>' +
    '</div>';
  }).join('');
}

function selectCat(id) {
  selectedCat = id;
  renderCats();
  checkSubmit();
}

function setPayment(btn) {
  document.querySelectorAll('.pay-btn').forEach(function(b) { b.classList.remove('active'); });
  btn.classList.add('active');
  selectedPayment = btn.dataset.pay;
}

function setType(type) {
  currentType = type;
  document.getElementById('btnExpense').className = 'type-btn' + (type === 'expense' ? ' active-expense' : '');
  document.getElementById('btnIncome').className = 'type-btn' + (type === 'income' ? ' active-income' : '');

  document.getElementById('itemGroup').style.display = type === 'expense' ? 'block' : 'none';
  document.getElementById('catGroup').style.display = type === 'expense' ? 'block' : 'none';
  document.getElementById('payGroup').style.display = type === 'expense' ? 'block' : 'none';
  document.getElementById('detailGroup').style.display = type === 'income' ? 'block' : 'none';
  document.getElementById('taxGroup').style.display = type === 'income' ? 'block' : 'none';

  checkSubmit();
}

function checkSubmit() {
  var amt = parseFloat(document.getElementById('inputAmount').value);
  var dateVal = document.getElementById('inputDate').value;
  var valid = amt > 0 && dateVal;

  if (currentType === 'expense') {
    valid = valid && document.getElementById('inputItem').value.trim();
  } else {
    valid = valid && document.getElementById('inputDetail').value.trim();
  }

  document.getElementById('submitBtn').disabled = !valid;
}

function submitForm() {
  var btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.textContent = 'กำลังบันทึก...';

  var dateVal = document.getElementById('inputDate').value;
  var amount = parseFloat(document.getElementById('inputAmount').value);
  var note = document.getElementById('inputNote').value;

  if (currentType === 'expense') {
    var data = {
      date: dateVal,
      item: document.getElementById('inputItem').value.trim(),
      category: selectedCat,
      paymentMethod: selectedPayment,
      amount: amount,
      note: note
    };

    gasPost('saveExpense', data).then(function() {
        btn.disabled = false;
        btn.textContent = 'บันทึก';
        showToast('บันทึกรายจ่ายแล้ว ✓', 'success');
        resetForm();
        loadSummary();
        loadCreditTotal();
        loadCategoryChart();
      });
  } else {
    var data = {
      date: dateVal,
      detail: document.getElementById('inputDetail').value.trim(),
      amount: amount,
      note: note,
      tax3: document.getElementById('taxToggle').checked ? 'โดน' : ''
    };

    gasPost('saveIncome', data).then(function() {
        btn.disabled = false;
        btn.textContent = 'บันทึก';
        showToast('บันทึกรายรับแล้ว ✓', 'success');
        resetForm();
        loadSummary();
      });
  }
}

function resetForm() {
  document.getElementById('inputAmount').value = '';
  document.getElementById('inputItem').value = '';
  document.getElementById('inputDetail').value = '';
  document.getElementById('inputNote').value = '';
  document.getElementById('taxToggle').checked = false;
  updateTaxToggleUI();
  selectedCat = 'อาหาร';
  selectedPayment = 'เงินสด';
  renderCats();
  document.querySelectorAll('.pay-btn').forEach(function(b) { b.classList.remove('active'); });
  document.querySelector('.pay-btn[data-pay="เงินสด"]').classList.add('active');

  var fp = document.getElementById('inputDate')._flatpickr;
  if (fp) fp.setDate(new Date());

  document.getElementById('submitBtn').disabled = true;
}

function switchView(view) {
  currentView = view;
  document.querySelectorAll('.view').forEach(function(v) { v.classList.remove('active'); });
  document.querySelectorAll('.nav-item').forEach(function(n) { n.classList.remove('active'); });

  if (view === 'home') {
    document.getElementById('homeView').classList.add('active');
    document.getElementById('fabBtn').style.display = 'flex';
  } else if (view === 'add') {
    document.getElementById('addView').classList.add('active');
    document.getElementById('fabBtn').style.display = 'none';
  }

  document.querySelector('.nav-item[data-view="' + view + '"]').classList.add('active');
}

function showToast(msg, type) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (type ? ' ' + type : '');
  setTimeout(function() { t.className = 'toast'; }, 2500);
}

function updateTaxToggleUI() {
  var on = document.getElementById('taxToggle').checked;
  var knob = document.getElementById('taxKnob');
  var track = knob.previousElementSibling;
  if (on) {
    track.style.background = 'var(--accent)';
    knob.style.left = '23px';
    knob.style.background = '#fff';
  } else {
    track.style.background = 'var(--surface3)';
    knob.style.left = '3px';
    knob.style.background = 'var(--text2)';
  }
}

function setupEvents() {
  document.getElementById('inputAmount').addEventListener('input', checkSubmit);
  document.getElementById('inputItem').addEventListener('input', checkSubmit);
  document.getElementById('inputDetail').addEventListener('input', checkSubmit);
  document.getElementById('taxToggle').addEventListener('change', updateTaxToggleUI);

  document.querySelectorAll('.nav-item').forEach(function(item) {
    item.addEventListener('click', function() {
      switchView(item.dataset.view);
    });
  });

  document.querySelectorAll('.period-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      document.querySelectorAll('.period-btn').forEach(function(b) { b.classList.remove('active'); });
      btn.classList.add('active');
      currentPeriod = btn.dataset.period;

      var controls = document.getElementById('periodControls');
      var monthSel = document.getElementById('monthSelect');

      if (currentPeriod === 'all') {
        controls.classList.remove('show');
      } else if (currentPeriod === 'year') {
        controls.classList.add('show');
        monthSel.style.display = 'none';
      } else {
        controls.classList.add('show');
        monthSel.style.display = '';
      }

      loadSummary();
      loadCategoryChart();
    });
  });

  document.querySelectorAll('.credit-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      document.querySelectorAll('.credit-btn').forEach(function(b) { b.classList.remove('active'); });
      btn.classList.add('active');
      currentCreditPeriod = btn.dataset.credit;
      loadCreditTotal();
    });
  });
}

init();
</script>
</body>
</html>
